<!DOCTYPE html>
<html>
<head>
    <title>Machine Learning Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: green;
        }

        .result {
            font-size: 24px;
            color: blue;
            margin-top: 20px;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>

</head>
<body>

    <div class="container">

        <h1>🤖 Machine Learning Prediction</h1>

        <h2>Predicted Students for Next Day</h2>

        <div class="result">
            {{ predicted_students }} Students
        </div>

        <br>

        <a href="/">
            <button>Home</button>
        </a>

    </div>

</body>
</html>
