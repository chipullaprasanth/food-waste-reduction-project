<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
            text-align:center;
            padding-top:50px;
        }

        .container{
            background:white;
            width:70%;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:green;
        }

        .note{
            background:#e8f5e9;
            padding:15px;
            margin:15px;
            border-radius:8px;
            font-size:18px;
        }

        button{
            background:green;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🔔 Notifications</h1>

    <div class="note">
        ⚠️ Food waste increased by 10% today.
    </div>

    <div class="note">
        ✅ Food prediction completed successfully.
    </div>

    <div class="note">
        💰 Monthly savings reached ₹4000.
    </div>

    <br>

    <a href="/">
        <button>🏠 Home</button>
    </a>

</div>

</body>
</html>
