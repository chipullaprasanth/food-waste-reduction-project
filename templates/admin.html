<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;
}

.container{
    width:80%;
    margin:auto;
    margin-top:40px;
}

h1{
    color:green;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

.card{
    background:white;
    width:220px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

.card h2{
    color:green;
    font-size:35px;
}

button{
    margin:10px;
    padding:12px 20px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

</style>

</head>

<body>

<div class="container">

<h1>👨‍💼 Admin Panel</h1>

<div class="cards">

<div class="card">
<h2>{{ total_users }}</h2>
<p>Registered Users</p>
</div>

<div class="card">
<h2>{{ total_feedback }}</h2>
<p>Feedback Received</p>
</div>

<div class="card">
<h2>{{ total_predictions }}</h2>
<p>Total Predictions</p>
</div>

</div>

<br>

<a href="/">
<button>🏠 Home</button>
</a>

<a href="/dashboard">
<button>📊 Dashboard</button>
</a>

<a href="/history">
<button>📜 View History</button>
</a>

</div>

</body>
</html>
