<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:green;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

label{
    font-size:18px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border-radius:5px;
    border:1px solid gray;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

.result{
    margin-top:30px;
    background:#e8f5e9;
    padding:20px;
    border-radius:8px;
    border-left:6px solid green;
}

.nav{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
}

.nav a{
    text-decoration:none;
}

.nav button{
    width:180px;
}

footer{
    margin-top:40px;
    text-align:center;
    background:#222;
    color:white;
    padding:15px;
}

</style>

</head>

<body>

<header>

<h1>🍽 Food Quantity Prediction</h1>

<p>Predict food requirement based on student attendance</p>

</header>

<div class="container">

<form method="POST">

<label>Enter Number of Students</label>

<input
type="number"
name="students"
placeholder="Example : 70"
required>

<button type="submit">
Predict Food Requirement
</button>

</form>

{% if prediction %}

<div class="result">

<h2>Prediction Result</h2>

<p>{{ prediction }}</p>

</div>

{% endif %}

<div class="nav">

<a href="/">
<button type="button">
🏠 Home
</button>
</a>

<a href="/dashboard">
<button type="button">
📊 Dashboard
</button>
</a>

</div>

</div>

<footer>

<p>© 2026 Smart Hostel Food Management System</p>

</footer>

</body>
</html>
