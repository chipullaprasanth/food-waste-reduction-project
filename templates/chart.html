<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Waste Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:green;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:30px auto;
}

.chart-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    margin-bottom:30px;
}

canvas{
    max-width:100%;
    height:400px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-top:20px;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

footer{
    margin-top:40px;
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<header>

<h1>📈 Food Waste Analysis Dashboard</h1>

<p>Weekly Hostel Food Analysis</p>

</header>

<div class="container">

<div class="chart-box">

<h2 style="text-align:center;">📊 Weekly Food Waste (Kg)</h2>

<canvas id="barChart"></canvas>

</div>

<div class="chart-box">

<h2 style="text-align:center;">🥧 Food Consumption Ratio</h2>

<canvas id="pieChart"></canvas>

</div>

<div class="buttons">

<a href="/">
<button>🏠 Home</button>
</a>

<a href="/dashboard">
<button>📊 Dashboard</button>
</a>

<a href="/report">
<button>📄 Daily Report</button>
</a>

</div>

</div>

<footer>

<p>© 2026 Smart Hostel Food Management System</p>

</footer>

<script>

// Bar Chart

new Chart(document.getElementById("barChart"),{

type:"bar",

data:{

labels:[
"Mon",
"Tue",
"Wed",
"Thu",
"Fri",
"Sat",
"Sun"
],

datasets:[{

label:"Food Waste (Kg)",

data:[
5,
3,
4,
2,
6,
3,
1
],

backgroundColor:[
"#4CAF50",
"#2196F3",
"#FFC107",
"#FF5722",
"#9C27B0",
"#009688",
"#795548"
]

}]

},

options:{
responsive:true
}

});


// Pie Chart

new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{

labels:[
"Food Consumed",
"Food Wasted"
],

datasets:[{

data:[
90,
10
],

backgroundColor:[
"#4CAF50",
"#F44336"
]

}]

},

options:{
responsive:true
}

});

</script>

</body>
</html>
