<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:40px;
        }

        .container{
            width:60%;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h1{
            color:green;
        }

        input{
            width:80%;
            padding:10px;
            margin:10px;
            font-size:16px;
        }

        button{
            background:green;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        h3{
            color:blue;
        }
    </style>
</head>

<body>

<div class="container">

<h1>📅 Student Attendance</h1>

<form method="POST">

<input type="date" name="date" required><br>

<input type="number"
       name="students"
       placeholder="Students Present"
       required><br>

<button type="submit">
Save Attendance
</button>

</form>

{% if message %}
<h3>{{ message }}</h3>
{% endif %}

<br>

<a href="/">
<button>🏠 Home</button>
</a>

</div>

</body>
</html>
