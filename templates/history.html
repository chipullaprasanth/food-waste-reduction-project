<!DOCTYPE html>
<html>
<head>

    <title>Prediction History</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            text-align:center;
        }

        .container{
            width:95%;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:green;
        }

        form{
            margin:20px;
        }

        input{
            padding:10px;
            width:250px;
            border:1px solid gray;
            border-radius:5px;
            font-size:16px;
        }

        button{
            padding:10px 18px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin:5px;
        }

        button:hover{
            background:darkgreen;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table,th,td{
            border:1px solid gray;
        }

        th{
            background:green;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
        }

        .delete{
            background:red;
        }

        .delete:hover{
            background:darkred;
        }

    </style>

</head>

<body>

<div class="container">

<h1>📜 Prediction History</h1>

<form method="POST">

<input
type="text"
name="search"
placeholder="Search by Students"
value="{{ search }}">

<button type="submit">🔍 Search</button>

<a href="/history">
<button type="button">🔄 Clear</button>
</a>

<a href="/export_excel">
<button type="button">📥 Export Excel</button>
</a>

</form>

<table>

<tr>

<th>ID</th>
<th>Students</th>
<th>Rice (Kg)</th>
<th>Curry (Kg)</th>
<th>Chapati</th>
<th>Dal (Kg)</th>
<th>Action</th>

</tr>

{% for row in rows %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>

<td>

<a href="/delete_history/{{ row[0] }}">

<button class="delete">

🗑 Delete

</button>

</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">
<button>🏠 Home</button>
</a>

<a href="/dashboard">
<button>📊 Dashboard</button>
</a>

</div>

</body>
</html>
