<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hostel Food Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7f9;
        }

        header{
            background:green;
            color:white;
            padding:20px;
            text-align:center;
        }

        header h1{
            font-size:36px;
        }

        header p{
            margin-top:10px;
            font-size:18px;
        }

        .container{
            width:90%;
            margin:auto;
            padding:30px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-top:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card a{
            text-decoration:none;
        }

        .card button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:green;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .card button:hover{
            background:darkgreen;
        }

        footer{
            margin-top:40px;
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
        }

    </style>

</head>
<body>

<header>

<h1>🍽 Smart Hostel Food Management System</h1>

<p>
Predict Food • Reduce Waste • Save Money • Help Society
</p>

</header>

<div class="container">

<div class="buttons">

<div class="card">
<a href="/dashboard">
<button>📊 Dashboard</button>
</a>
</div>

<div class="card">
<a href="/predict">
<button>🍚 Predict Food</button>
</a>
</div>

<div class="card">
<a href="/waste">
<button>♻ Food Waste Calculator</button>
</a>
</div>

<div class="card">
<a href="/attendance">
<button>📅 Attendance</button>
</a>
</div>

<div class="card">
<a href="/inventory">
<button>📦 Inventory</button>
</a>
</div>

<div class="card">
<a href="/donation">
<button>❤️ Food Donation</button>
</a>
</div>

<div class="card">
<a href="/expense">
<button>💰 Expenses</button>
</a>
</div>

<div class="card">
<a href="/history">
<button>📜 History</button>
</a>
</div>

<div class="card">
<a href="/chart">
<button>📈 Analysis</button>
</a>
</div>

<div class="card">
<a href="/report">
<button>📄 Report</button>
</a>
</div>

<div class="card">
<a href="/download_report">
<button>⬇ Download PDF</button>
</a>
</div>

<div class="card">
<a href="/ml_predict">
<button>🤖 ML Prediction</button>
</a>
</div>

<div class="card">
<a href="/feedback">
<button>📝 Feedback</button>
</a>
</div>

<div class="card">
<a href="/contact">
<button>📞 Contact</button>
</a>
</div>

<div class="card">
<a href="/about">
<button>ℹ About Project</button>
</a>
</div>

<div class="card">
<a href="/login">
<button>🔐 Admin Login</button>
</a>
</div>

<div class="card">
<a href="/register">
<button>👤 User Registration</button>
</a>
<a href="/admin">
    <button>👨‍💼 Admin Panel</button>
</a>
</div>

</div>

</div>

<footer>

© 2026 Smart Hostel Food Management System

</footer>

</body>
</html>
