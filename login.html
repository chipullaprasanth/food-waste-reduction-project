<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:green;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

label{
    font-size:18px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

.message{
    margin-top:20px;
    text-align:center;
    color:green;
    font-weight:bold;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:25px;
}

.buttons a{
    text-decoration:none;
}

footer{
    margin-top:40px;
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<header>

<h1>🔐 Admin Login</h1>

<p>Smart Hostel Food Management System</p>

</header>

<div class="container">

<form method="POST">

<label>Username</label>

<input
type="text"
name="username"
placeholder="Enter Username"
required>

<label>Password</label>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">

Login

</button>

</form>

{% if message %}

<div class="message">

{{ message }}

</div>

{% endif %}

<div class="buttons">

<a href="/">

<button type="button">

🏠 Home

</button>

</a>

<a href="/register">

<button type="button">

👤 Register

</button>

</a>

</div>

</div>

<footer>

<p>© 2026 Smart Hostel Food Management System</p>

</footer>

</body>
</html>
