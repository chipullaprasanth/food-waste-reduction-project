<!DOCTYPE html>
<html>
<head>

<title>Expense Management</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
width:60%;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:80%;
padding:12px;
margin:10px;
font-size:16px;
}

button{
background:green;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

h1{
color:green;
}

</style>

</head>

<body>

<div class="container">

<h1>💰 Expense Management</h1>

<form method="POST">

<input
type="date"
name="date"
required>

<br>

<input
type="number"
step="0.01"
name="amount"
placeholder="Expense Amount"
required>

<br>

<input
type="text"
name="description"
placeholder="Expense Description"
required>

<br><br>

<button type="submit">
Save Expense
</button>

</form>

{% if message %}
<h3 style="color:green;">
{{ message }}
</h3>
{% endif %}

<br>

<a href="/">
<button>🏠 Home</button>
</a>

</div>

</body>
</html>
